# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name api.rentoroll.in;
    return 301 https://$host$request_uri;
}

# ── HTTPS — API ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.rentoroll.in;

    # Certificates managed by Certbot (run: certbot --nginx -d api.rentoroll.in)
    ssl_certificate     /etc/letsencrypt/live/api.rentoroll.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rentoroll.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header Referrer-Policy           "no-referrer"     always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy to NestJS (bound to 127.0.0.1:8080 in docker-compose)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Health check endpoint — no logging noise
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }
}
