# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name rentoz.online www.rentoz.online;
    return 301 https://rentoz.online$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name rentoz.online www.rentoz.online;

    # Certificates managed by Certbot (run: certbot --nginx -d rentoz.online -d www.rentoz.online)
    ssl_certificate     /etc/letsencrypt/live/rentoz.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentoz.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options           "DENY"        always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── API → NestJS (Docker on 127.0.0.1:8080) ──────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Health check — no logging noise
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }

    # ── Website → Expo web static export ─────────────────────────────────
    location / {
        root  /var/www/rentoroll;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root    /var/www/rentoroll;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
