version: "3.9"

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: rentoroll-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"   # localhost-only — not exposed to the internet
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: rentoroll
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (DB UI) ─────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: rentoroll-mongo-express
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"     # localhost-only — access via SSH tunnel
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  # ── Frontend (Expo Web) ───────────────────────────────────────────────────
  frontend:
    image: ghcr.io/manishbit97/rentoroll-web:latest
    container_name: rentoroll-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"       # localhost-only — nginx proxies 443 → here

  # ── Backend API (NestJS) ──────────────────────────────────────────────────
  backend:
    image: ghcr.io/manishbit97/rentoroll-backend:latest
    container_name: rentoroll-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"     # localhost-only — nginx proxies 443 → here
    env_file:
      - .env.docker
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  # Named volume — portable between cloud providers via mongodump/mongorestore
  mongo_data:
    driver: local
