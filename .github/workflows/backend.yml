name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend-nest/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rentoroll-backend

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend-nest
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deploy directory on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p /opt/rentoroll

      - name: Upload docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/opt/rentoroll"

      - name: Write .env.docker from secrets
        uses: appleboy/ssh-action@v1
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET
          script: |
            cat > /opt/rentoroll/.env.docker <<EOF
            PORT=8080
            MONGODB_URI=mongodb://mongodb:27017
            DATABASE=rentoroll
            JWT_SECRET=${JWT_SECRET}
            NODE_ENV=production
            RUN_SETUP=false
            EOF

      - name: Pull image & restart backend
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd /opt/rentoroll

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull backend

            # Start MongoDB + mongo-express if not running (first deploy), then recreate backend only
            docker compose up -d mongodb mongo-express
            docker compose up -d --no-deps --force-recreate backend

            # Wait up to 60s for health check
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' rentoroll-backend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then
                echo "Healthy after $((i * 5))s"
                docker logout ghcr.io
                docker image prune -f
                exit 0
              fi
              echo "  attempt $i/12 — status: $STATUS"
              sleep 5
            done

            docker logout ghcr.io
            echo "ERROR: backend did not become healthy in time"
            docker logs --tail 50 rentoroll-backend
            exit 1
